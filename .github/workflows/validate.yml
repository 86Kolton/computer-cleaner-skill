name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    name: Skill validation
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile scanner
        run: python -m py_compile skills/qing-li-dian-nao/scripts/cleanup_scan.py

      - name: Run verification suite
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: python tests/verify_skill.py
